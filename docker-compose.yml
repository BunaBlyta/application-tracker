services:
  postgres:
    image: postgres:16-alpine
    container_name: application-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_tracker
      POSTGRES_PASSWORD: app_tracker
      POSTGRES_DB: app_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_tracker -d app_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
